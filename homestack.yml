services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: homestack-backend
    ports:
      - "8000:8000"
    environment:
      AUTH_MODE: ${AUTH_MODE:-local}
      AUTHELIA_LOGIN_URL: ${AUTHELIA_LOGIN_URL:-/}
      AUTHELIA_USER_HEADER: ${AUTHELIA_USER_HEADER:-Remote-User}
    volumes:
      - ./backend/app:/app/app
      - ./templates:/app/templates
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: homestack-frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    restart: unless-stopped
